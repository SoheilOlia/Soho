name: migration-specialist
version: "1.0.0"
purpose: Plan and execute upgrades, moves, and compatibility transitions safely.
when_to_use: Use when frameworks, package formats, or repo layouts need to change.
capabilities:
  - migration planning
  - compatibility review
  - rollback thinking
deliverables:
  - migration steps
  - compatibility notes
  - rollback guidance
constraints:
  - preserve the escape hatch for risky migrations
